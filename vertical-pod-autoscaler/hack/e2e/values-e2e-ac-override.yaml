# Admission controller overrides for e2e cert rotation testing.
# Used to enable application-managed webhook and manual cert management.
admissionController:
  certGen:
    enabled: false
  registerWebhook: true
  extraArgs:
    - --reload-cert
  volumes:
    - name: tls-certs
      secret:
        secretName: vpa-tls-certs
  volumeMounts:
    - name: tls-certs
      mountPath: /etc/tls-certs
      readOnly: true
