# Helm values for E2E testing — used by both deploy-for-e2e.sh (CI) and
# deploy-for-e2e-locally.sh. Image repository, tag, and pullPolicy are
# overridden via --set flags by the calling script (Always for CI, Never for
# local KIND).
fullnameOverride: vpa

# Pod security context — matches the original deploy/admission-controller-deployment.yaml.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

# Component configurations. All three components are disabled by default;
# the calling script enables only the ones the suite needs via --set.
admissionController:
  enabled: false
  replicas: 1
  # Disable pod anti-affinity for single-node clusters (Prow GCE + local KIND).
  affinity: {}
  podDisruptionBudget:
    enabled: false
  # Use application-managed webhook for e2e testing. The admission controller
  # itself creates the MutatingWebhookConfiguration named vpa-webhook-config
  # on startup. The cert rotation e2e test requires this mode (it modifies
  # vpa-tls-certs and expects the controller to hot-reload).
  registerWebhook: true
  certGen:
    enabled: false
  # Hot-reload the leaf and CA certs from disk — required by the e2e cert
  # rotation test in test/e2e/v1/admission_controller.go.
  extraArgs:
    - --reload-cert
  # Mount the secret created by gencerts.sh / openssl. The keys are written
  # at the secret's top level (caCert.pem, serverCert.pem, serverKey.pem,
  # caKey.pem) so we omit `items:` and the secret keys map directly to file
  # names. The e2e test admission_controller.go:1152 supports both the
  # gencerts.sh (*.pem) and Helm certgen (key/cert/ca) formats.
  volumes:
    - name: tls-certs
      secret:
        secretName: vpa-tls-certs
  volumeMounts:
    - name: tls-certs
      mountPath: /etc/tls-certs
      readOnly: true

recommender:
  enabled: false
  replicas: 1
  affinity: {}
  podDisruptionBudget:
    enabled: false
  # Single replica → no leader election needed; avoids 15s lease wait at startup.
  leaderElection:
    enabled: false

updater:
  enabled: false
  replicas: 1
  affinity: {}
  podDisruptionBudget:
    enabled: false
  leaderElection:
    enabled: false