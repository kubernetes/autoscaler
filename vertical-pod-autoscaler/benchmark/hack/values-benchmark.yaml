# Helm values for VPA benchmark
# Used by full-benchmark.sh to configure benchmark-specific settings:
# - Increased QPS/burst on all components (to avoid client-side throttling)
# - Longer updater interval (steps can take longer than the default 60s at scale)
# - Memory saver mode for recommender

recommender:
  extraArgs:
    - --kube-api-qps=100
    - --kube-api-burst=200
    - --memory-saver=true

updater:
  extraArgs:
    - --kube-api-qps=100
    - --kube-api-burst=200
    - --updater-interval=2m

admissionController:
  extraArgs:
    - --kube-api-qps=100
    - --kube-api-burst=200
