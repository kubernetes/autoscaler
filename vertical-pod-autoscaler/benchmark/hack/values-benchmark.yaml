# Helm values for VPA benchmark configuration.
# Increases QPS/burst on all components to avoid client-side throttling
# and extends the updater interval for scale-heavy benchmark steps.

recommender:
  extraArgs:
    - --kube-api-qps=100
    - --kube-api-burst=200
    - --memory-saver=true

updater:
  extraArgs:
    - --kube-api-qps=100
    - --kube-api-burst=200
    - --updater-interval=2m

admissionController:
  extraArgs:
    - --kube-api-qps=100
    - --kube-api-burst=200
