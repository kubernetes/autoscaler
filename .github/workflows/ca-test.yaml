name: Cluster Autoscaler

on:
  push:
    paths:
      - 'cluster-autoscaler/**'
  pull_request:
    paths:
      - 'cluster-autoscaler/**'

env:
  GOPATH: ${{ github.workspace }}/go

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ${{ env.GOPATH }}/src/k8s.io/autoscaler

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: |
             ${{ env.GOPATH}}/src/k8s.io/autoscaler/cluster-autoscaler/go.sum

      - name: Apt-get
        run: sudo apt-get install libseccomp-dev -qq

      - name: Test
        working-directory: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler
        run: make test-ci
        env:
          GO111MODULE: auto
          PROJECT_NAMES: ""
