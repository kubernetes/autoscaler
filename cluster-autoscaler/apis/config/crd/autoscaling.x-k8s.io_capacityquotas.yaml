  name: capacityquotas.autoscaling.x-k8s.io
spec:
  group: autoscaling.x-k8s.io
  names:
    kind: CapacityQuota
    listKind: CapacityQuotaList
    plural: capacityquotas
    shortNames:
    - cq
    singular: capacityquota
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CapacityQuota limits the amount of resources that can be provisioned in the cluster
          by the node autoscaler. Resources used are calculated by summing up resources
          reported in the status.capacity field of each node passing the configured
          label selector. When making a provisioning decision, node autoscaler will
          take all CapacityQuota objects that match the labels of the upcoming node.
          If provisioning that node would exceed any of the matching quotas, node
          autoscaler will not provision it. Quotas are best-effort, and it is possible
          that in rare circumstances node autoscaler will exceed them, for example
          due to stale caches.
          More info: https://github.com/kubernetes/autoscaler/blob/master/cluster-autoscaler/proposals/granular-resource-limits.md
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CapacityQuota
            properties:
              limits:
                description: Limits define quota limits.
                properties:
                  resources:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Resources define resource limits of this quota.

                      Currently supported built-in resources: cpu, memory. Additionally,
                      nodes key can be used to limit the number of existing nodes.
                      All resource quantities must be non-negative integers. Binary and decimal units are allowed as long as the quantity
                      can be converted to an integer.

                      Example allowed quantities: "32Gi", "2k", "10"
                      Example invalid quantities: "3.67Gi", "500m", "0.3"

                      **Caveat**: milli quantities are not supported even if they represent an integer, for example: "1000m".

                      Node autoscaler implementations and cloud providers can support custom
                      resources, such as GPU.
                    maxProperties: 20
                    type: object
                    x-kubernetes-validations:
                    - message: Resource names must be 63 characters or less.
                      rule: self.all(key, size(key) <= 63)
                    - message: All resource quantities must be non-negative integers.
                      rule: 'self.all(key, type(self[key]) == int ? self[key] >= 0
                        : (!self[key].startsWith(''-'') && quantity(self[key]).isInteger()))'
                required:
                - resources
                type: object
              selector:
                description: |-
                  Selector is a label selector selecting the nodes to which the quota applies.
                  Empty or nil selector matches all nodes.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - limits
            type: object
          status:
            description: status defines the observed state of CapacityQuota
            properties:
              conditions:
                description: |-
                  Conditions provide a standard mechanism for reporting the quota's state.
                  CapacityQuota will be enforced only if it has a Valid=True condition.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              used:
                description: Used shows the current usage of the quota.
                properties:
                  resources:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Resources shows the current usage of the resources
                      defined in the quota limits.
                    type: object
                required:
                - resources
                type: object
            type: object
        required:
